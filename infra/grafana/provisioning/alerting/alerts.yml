apiVersion: 1

groups:
  - orgId: 1
    name: Watchdog
    folder: Monitoring
    interval: 1m
    rules:
      - uid: watchdog
        title: Watchdog
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'vector(1)'
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 0s
        annotations:
          summary: "모니터링 시스템 정상 작동 중"
          description: "Prometheus와 Grafana가 정상적으로 동작하고 있습니다."
        labels:
          severity: info

  - orgId: 1
    name: Node Alerts
    folder: Monitoring
    interval: 1m
    rules:
      - uid: high-cpu-usage
        title: High CPU Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: '100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)'
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params:
                      - 30
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: "CPU 사용률 임계값 초과"
          description: "CPU 사용률이 30%를 초과했습니다."
        labels:
          severity: warning

      - uid: high-disk-usage
        title: High Disk Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: '100 * (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}))'
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params:
                      - 50
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: "디스크 사용률 임계값 초과"
          description: "디스크 사용률이 50%를 초과했습니다."
        labels:
          severity: warning
