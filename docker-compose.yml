services:
  db:
    image: mariadb:11
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./apps/backend
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=${MARIADB_USER}
      - DB_PASSWORD=${MARIADB_PASSWORD}
      - DB_DATABASE=${MARIADB_DATABASE}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3001"
    restart: unless-stopped

  frontend:
    build: ./apps/frontend
    env_file:
      - .env
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    build: ./infra/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend

  node-exporter:
    build: ./infra/node-exporter
    expose:
      - "9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  prometheus:
    build: ./infra/prometheus
    expose:
      - "9090"
    depends_on:
      - backend
      - node-exporter
    restart: unless-stopped

  grafana:
    build: ./infra/grafana
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  db_data:
  grafana_data:
  nginx_certs:
